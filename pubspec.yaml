name: vigor
description: "A fitness project"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  fl_chart: ^0.66.0

  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  flutter_local_notifications: ^17.0.0


  google_sign_in: ^6.2.1
  provider: ^6.1.2
  intl: ^0.19.0
  crypto: ^3.0.3
  google_fonts: ^6.3.3

  sensors_plus: ^4.0.2
  lottie: ^3.1.2
  shared_preferences: ^2.5.5

  pedometer: 4.2.0
  permission_handler: ^11.0.0

  image_picker: ^1.2.1

  share_plus: ^10.0.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/GLASS.png
    - assets/images/JUG.png
    - assets/images/Vigor_Logo.png



